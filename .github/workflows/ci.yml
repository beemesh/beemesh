name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cargo build
        run: cargo build --workspace --all-targets

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get -y install podman

      - name: Start Podman API service
        run: |
          export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          mkdir -p "$XDG_RUNTIME_DIR/podman"
          podman system service --time=0 unix://$XDG_RUNTIME_DIR/podman/podman.sock &
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          echo "CONTAINER_HOST=unix://$XDG_RUNTIME_DIR/podman/podman.sock" >> "$GITHUB_ENV"

      - name: Wait for Podman
        run: |
          for i in {1..20}; do
            if podman info >/dev/null 2>&1; then
              echo "Podman is ready"
              exit 0
            fi
            echo "Waiting for Podman..."
            sleep 0.5
          done
          echo "Podman did not become ready in time"
          exit 1

      - name: Pre-pull test images
        run: |
          echo "Pre-pulling nginx image to speed up integration tests..."
          podman pull docker.io/library/nginx:latest
      
      - name: Cargo tests with Podman
        env:
          CONTAINER_HOST: ${{ env.CONTAINER_HOST }}
          BEEMESH_SELECTION_WINDOW_MS: "1000"
        run: cargo test --workspace
